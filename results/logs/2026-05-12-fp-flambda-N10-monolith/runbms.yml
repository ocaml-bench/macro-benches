  macro-cpdf-monorepo:
  - cpdf_merge
  - cpdf_blacktext
  - cpdf_scale
  - cpdf_squeeze
  macro-decompress:
  - test_decompress
  macro-devkit:
  - devkit_htmlstream
  - devkit_stre
  - devkit_network
  - devkit_gzip
  macro-eio:
  - eio_fiber_stream
  macro-irmin:
  - irmin_mem_rw
  macro-jsoo:
  - jsoo
  macro-lavyek-monorepo:
  - lavyek_kv_1d
  - lavyek_kv_2d
  - lavyek_kv_4d
  - lavyek_kv_8d
  macro-liq-video-frames:
  - liq_video_frames_full
  - liq_video_frames_page
  - liq_video_frames_first
  - liq_video_frames_none
  - liq_video_frames_pool
  macro-liquidsoap-lang:
  - liq_parse_typecheck
  macro-menhir-monorepo:
  - menhir_ocamly
  - menhir_sql_parser
  - menhir_sysver
  macro-merlin: []
  macro-ocamlc-self-compile:
  - ocamlc_self_compile
  macro-ocamlformat:
